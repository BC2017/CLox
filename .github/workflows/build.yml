name: Build

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build CLox
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          gcc --version
          make --version

      - name: Build
        run: make all

      - name: Verify binary
        run: test -x bin/clox && file bin/clox

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: clox-linux-x64
          path: bin/clox
          if-no-files-found: error
